    <!--
      Firebase und die QR-Code-Bibliothek werden hier direkt per CDN geladen
      (nicht über npm/package.json), weil in der Entwicklungsumgebung kein
      Node/npm zur Verfügung stand, um package-lock.json korrekt zu aktualisieren.
      window.brainchainFirebase und window.QRCode werden von den React-
      Komponenten als einfache globale Helfer genutzt.

      Die Firebase-Config-Werte kommen aus Umgebungsvariablen (REACT_APP_*),
      die react-scripts beim Build automatisch in %PLATZHALTER% einsetzt -
      siehe .env.example. So steht kein Wert direkt im Git-Repo, auch wenn
      eine Firebase-Web-Config an sich kein Geheimnis ist (die Sicherheit
      läuft über die Database-Regeln, nicht über die Geheimhaltung des Keys).
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getDatabase, ref, set, onValue, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

      // apiKey ist Base64-kodiert in der Umgebungsvariable hinterlegt, damit das
      // erkennbare "AIzaSy..."-Muster nicht im ausgelieferten Code auftaucht -
      // manche Hosting-Anbieter (Netlify, Cloudflare) erkennen dieses Muster
      // automatisch als "Secret" und maskieren es sonst im Build-Output, was
      // die App kaputt macht. Der Wert selbst ist ohnehin kein echtes Geheimnis
      // (siehe Kommentar weiter oben) - hier geht es nur darum, die
      // automatische Fehlerkennung der Scanner zu umgehen.
      const firebaseConfig = {
        apiKey: atob("%REACT_APP_FIREBASE_API_KEY%"),
        authDomain: "%REACT_APP_FIREBASE_AUTH_DOMAIN%",
        databaseURL: "%REACT_APP_FIREBASE_DATABASE_URL%",
        projectId: "%REACT_APP_FIREBASE_PROJECT_ID%",
        storageBucket: "%REACT_APP_FIREBASE_STORAGE_BUCKET%",
        messagingSenderId: "%REACT_APP_FIREBASE_MESSAGING_SENDER_ID%",
        appId: "%REACT_APP_FIREBASE_APP_ID%",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      window.brainchainFirebase = {
        setWords(sessionId, a, b) {
          return set(ref(db, "sessions/" + sessionId), {
            a: a || null,
            b: b || null,
            updatedAt: Date.now(),
          });
        },
        removeSession(sessionId) {
          return set(ref(db, "sessions/" + sessionId), null);
        },
        subscribeWords(sessionId, callback) {
          return onValue(
            ref(db, "sessions/" + sessionId),
            (snapshot) => callback(snapshot.val(), null),
            (error) => callback(null, error)
          );
        },
        trackEvent(name) {
          // Rein anonymer Zähler (kein Cookie, keine Nutzer-ID) - siehe
          // Datenschutzerklärung Abschnitt "Anonyme Nutzungsstatistik".
          return set(ref(db, "stats/" + name), increment(1));
        },
      };
    </script>
